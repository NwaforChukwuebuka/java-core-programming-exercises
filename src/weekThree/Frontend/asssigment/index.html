<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>BICCAS</title>
</head>

<body>
    <div class="mainContainer">

        <div class="main">

            <div class="header">
                <div><img src="Biccas.png" alt="BICS Logo"></div>
                <div class="navMenu">
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="#">Product</a></li>
                        <li><a href="#">FAQ</a></li>
                        <li><a href="#">Blog</a></li>
                        <li><a href="#">About Us</a></li>

                    </ul>
                </div>

                <div class="buttons">
                    <button class="login">Login</button>
                    <button class="signup">Sign Up</button>
                </div>
            </div>
            <div class="hero">
                <div class="textWrapper">
                    <h1>We’re here to Increase your Productivity</h1>
                    <div class="vector"><img src="Vector 32.png" alt=""></div>
                    <h4>Let's make your work more organize and easily using the Taskio Dashboard with many of the latest featuresin managing work every day.</h4>
                    <div>
                        <div>Try free trial</div>
                        <div>
                            <button class="playButton"><img src="play.png" alt="Play Button"></button>
                            <span>Watch Video</span>
                        </div>
                    </div>
                </div>
                <div class="imageWrapper"><img src="Group 138.png" alt="Hero Image"></div>
            </div>
            <div class="description"></div>

        </div>


        <div class="partners"></div>
        <div class="features"></div>
        <div class="benefits"></div>
        <div class="plan"></div>
        <div class="footer"></div>

    </div>
</body>

</html>
